<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <rect width="1200" height="630" fill="#0d0d0d"/>
  <!-- grid lines -->
  <line x1="0" y1="315" x2="1200" y2="315" stroke="#1a1a1a" stroke-width="1"/>
  <line x1="600" y1="0" x2="600" y2="630" stroke="#1a1a1a" stroke-width="1"/>
  <!-- glowing circle bg -->
  <circle cx="600" cy="280" r="220" fill="none" stroke="#00c853" stroke-width="1" opacity="0.15"/>
  <circle cx="600" cy="280" r="170" fill="none" stroke="#00c853" stroke-width="1" opacity="0.1"/>

  <!-- Camera body -->
  <rect x="460" y="220" width="260" height="190" rx="20" fill="#1a1a1a" stroke="#00c853" stroke-width="3"/>
  <!-- Shutter button -->
  <rect x="535" y="202" width="60" height="24" rx="8" fill="#00c853"/>
  <!-- Lens ring outer -->
  <circle cx="590" cy="315" r="72" fill="#0d0d0d" stroke="#00c853" stroke-width="3"/>
  <!-- Lens ring inner -->
  <circle cx="590" cy="315" r="52" fill="#111" stroke="#00c853" stroke-width="1.5" opacity="0.6"/>
  <!-- Aperture blades -->
  <path d="M590 263 L602 287 L578 287 Z" fill="#00c853" opacity="0.8"/>
  <path d="M590 367 L578 343 L602 343 Z" fill="#00c853" opacity="0.8"/>
  <path d="M538 315 L562 303 L562 327 Z" fill="#00c853" opacity="0.8"/>
  <path d="M642 315 L618 327 L618 303 Z" fill="#00c853" opacity="0.8"/>
  <!-- Lens center -->
  <circle cx="590" cy="315" r="28" fill="#0d0d0d" stroke="#00c853" stroke-width="2"/>
  <circle cx="590" cy="315" r="14" fill="#00c853" opacity="0.9"/>
  <circle cx="596" cy="309" r="5" fill="#fff" opacity="0.4"/>
  <!-- CCTV arm -->
  <path d="M720 250 L800 220 L800 380 L720 350" fill="none" stroke="#00c853" stroke-width="3" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Record dot -->
  <circle cx="710" cy="240" r="10" fill="#ff3b3b"/>

  <!-- Text -->
  <text x="600" y="465" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-weight="800" font-size="58" fill="#ffffff">
    <tspan fill="#00c853">Hidden</tspan>Cameras.tv
  </text>
  <text x="600" y="520" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="24" fill="#6b7280">
    Expert Reviews · Buying Guides · Security Tips
  </text>
</svg>
